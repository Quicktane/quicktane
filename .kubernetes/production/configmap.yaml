apiVersion: v1
kind: ConfigMap
metadata:
  name: quicktane-config
  namespace: quicktane
  labels:
    app.kubernetes.io/part-of: quicktane
data:
  APP_NAME: "Quicktane"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://api.demo.quicktane.com"
  APP_LOCALE: "en"
  APP_FALLBACK_LOCALE: "en"
  APP_FAKER_LOCALE: "en_US"
  APP_MAINTENANCE_DRIVER: "file"

  BCRYPT_ROUNDS: "12"

  LOG_CHANNEL: "stack"
  LOG_STACK: "single"
  LOG_LEVEL: "warning"

  DB_CONNECTION: "mysql"
  DB_HOST: "mariadb"
  DB_PORT: "3306"
  DB_DATABASE: "quicktane"
  DB_USERNAME: "quicktane"

  SESSION_DRIVER: "redis"
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: "/"

  BROADCAST_CONNECTION: "log"
  FILESYSTEM_DISK: "local"
  QUEUE_CONNECTION: "redis"

  CACHE_STORE: "redis"

  REDIS_CLIENT: "phpredis"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "null"

  MAIL_MAILER: "smtp"
  MAIL_HOST: "localhost"
  MAIL_PORT: "1025"
  MAIL_FROM_ADDRESS: "hello@quicktane.com"
  MAIL_FROM_NAME: "Quicktane"

  OCTANE_SERVER: "frankenphp"

  SCOUT_DRIVER: "meilisearch"
  MEILISEARCH_HOST: "http://meilisearch:7700"

  CORS_ALLOWED_ORIGINS: "https://demo.quicktane.com"
