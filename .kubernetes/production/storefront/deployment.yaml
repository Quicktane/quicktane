apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: quicktane
  labels:
    app.kubernetes.io/name: storefront
    app.kubernetes.io/part-of: quicktane
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app.kubernetes.io/name: storefront
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: quicktane
  labels:
    app.kubernetes.io/name: storefront
    app.kubernetes.io/part-of: quicktane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storefront
        app.kubernetes.io/part-of: quicktane
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: storefront
          image: ghcr.io/quicktane/quicktane/storefront:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
