apiVersion: batch/v1
kind: Job
metadata:
  name: quicktane-migrate-seed
  namespace: quicktane
  labels:
    app.kubernetes.io/name: migrate-seed
    app.kubernetes.io/part-of: quicktane
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate-seed
        app.kubernetes.io/part-of: quicktane
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: migrate-seed
          image: ghcr.io/quicktane/quicktane/api:latest
          command:
            - /bin/sh
            - -c
            - |
              php artisan migrate --force &&
              php artisan db:seed --force
          envFrom:
            - configMapRef:
                name: quicktane-config
            - secretRef:
                name: quicktane-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
