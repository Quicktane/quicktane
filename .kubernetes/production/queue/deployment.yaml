apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: quicktane
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/part-of: quicktane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: queue-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: queue-worker
        app.kubernetes.io/part-of: quicktane
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: queue-worker
          image: ghcr.io/quicktane/quicktane/api:latest
          command:
            - php
            - artisan
            - queue:work
            - redis
            - --sleep=3
            - --tries=3
            - --max-time=3600
          envFrom:
            - configMapRef:
                name: quicktane-config
            - secretRef:
                name: quicktane-secrets
          volumeMounts:
            - name: storage
              mountPath: /app/storage/app
              subPath: app
            - name: storage
              mountPath: /app/storage/logs
              subPath: logs
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: api-storage
