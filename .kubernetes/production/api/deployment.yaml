apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: quicktane
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: quicktane
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-storage
  namespace: quicktane
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: quicktane
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: quicktane
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: quicktane
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: quicktane
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: api
          image: ghcr.io/quicktane/quicktane/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: quicktane-config
            - secretRef:
                name: quicktane-secrets
          volumeMounts:
            - name: storage
              mountPath: /app/storage/app
              subPath: app
            - name: storage
              mountPath: /app/storage/logs
              subPath: logs
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: api-storage
